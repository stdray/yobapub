name: CI

on:
  push:
    branches:
      - master
      - new-player
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build release
        run: npm run build:release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: yobapub-release
          path: dist/release/

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/new-player')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: yobapub-release
          path: release

      - name: Clean remote directory and fix permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            echo "${{ secrets.DEPLOY_PASSWORD }}" | sudo -S rm -rf ${{ secrets.DEPLOY_WORKDIR }}/*
            echo "${{ secrets.DEPLOY_PASSWORD }}" | sudo -S chown -R ${{ secrets.DEPLOY_USERNAME }}:${{ secrets.DEPLOY_USERNAME }} ${{ secrets.DEPLOY_WORKDIR }}

      - name: Deploy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: release/*
          target: ${{ secrets.DEPLOY_WORKDIR }}
          strip_components: 1
          overwrite: true
