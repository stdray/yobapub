name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore & Build
        run: dotnet build back/YobaPub.Proxy/YobaPub.Proxy.csproj -c Release

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build & push Docker image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          TAG="${{ steps.tag.outputs.version }}"
          docker build \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            IMAGE="ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}"
            CONTAINER_NAME="yobapub-proxy"
            PASSWORD="${{ secrets.DEPLOY_PASSWORD }}"
            run_sudo() {
              printf '%s\n' "$PASSWORD" | sudo -S -p '' "$@"
            }
            run_sudo docker pull "$IMAGE"
            run_sudo docker stop "$CONTAINER_NAME" || true
            run_sudo docker rm "$CONTAINER_NAME" || true
            run_sudo docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              "$IMAGE"
            run_sudo docker system prune -a -f
