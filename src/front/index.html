<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>YobaPub</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script>
  (function(){
    var ua=navigator.userAgent;
    if(window.tizen||/Tizen|SmartTV|SMART-TV|Web0S|BRAVIA|AFT|Android TV/i.test(ua))return;
    var st=document.createElement('style');
    st.textContent='html,body{overflow-y:auto!important;height:auto!important}';
    document.head.appendChild(st);
  })();
  </script>
  <script src="vendor/jquery.min.js"></script>
  <script>
  // HLS bundle loader: picks legacy (0.14.x) or modern (1.5+).
  // Forced-legacy platforms (kp_legacy_hls_forced) always get legacy.
  // Synchronous document.write keeps the bundle in the parser stream so it
  // finishes loading before webpack-injected app.js runs.
  (function () {
    var forced = null, setting = null;
    try { forced = localStorage.getItem('kp_legacy_hls_forced'); } catch (e) {}
    try { setting = localStorage.getItem('kp_legacy_hls'); } catch (e) {}
    var legacy = forced === '1' || setting === null || setting === '1';
    var src = legacy ? 'vendor/hls-legacy.min.js' : 'vendor/hls-modern.min.js';
    document.write('<script src="' + src + '"><\/script>');
  })();
  </script>
  <script>
  // Verify modern hls.js loaded. If the bundle failed to parse (old WebKit
  // without Promise/Map/Symbol), window.Hls won't exist. Fall back to legacy
  // permanently and reload.
  (function () {
    try {
      if (localStorage.getItem('kp_legacy_hls_forced') === '1') return;
      if (localStorage.getItem('kp_legacy_hls') === null ||
          localStorage.getItem('kp_legacy_hls') === '1') return;
      if (typeof Hls === 'undefined' || typeof Hls.isSupported !== 'function') {
        localStorage.setItem('kp_legacy_hls', '1');
        localStorage.setItem('kp_legacy_hls_forced', '1');
        location.reload();
      }
    } catch (e) {}
  })();
  </script>
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <script>
  // Tizen 2.3 WebKit may drop the viewport meta on location.reload() due to
  // document.write parser interaction. Re-apply it from JS as a safety net.
  (function(){
    var vp=document.querySelector('meta[name="viewport"]');
    if(!vp){vp=document.createElement('meta');vp.name='viewport';document.head.appendChild(vp);}
    vp.setAttribute('content','width=1920, initial-scale=1.0');
  })();
  </script>
</head>
<body>
  <div id="app">
    <div id="sidebar" class="sidebar hidden"></div>
    <div id="pages">
      <div id="page-login" class="page"></div>
      <div id="page-watching" class="page hidden"></div>
      <div id="page-bookmarks" class="page hidden"></div>
      <div id="page-movie" class="page hidden"></div>
      <div id="page-serial" class="page hidden"></div>
      <div id="page-player" class="page hidden"></div>
      <div id="page-settings" class="page hidden"></div>
      <div id="page-novelties" class="page hidden"></div>
      <div id="page-search" class="page hidden"></div>
      <div id="page-tv" class="page hidden"></div>
      <div id="page-tv-player" class="page hidden"></div>
      <div id="page-history" class="page hidden"></div>
      <div id="exit-dialog" class="exit-dialog hidden">
        <div class="exit-dialog__box">
          <div class="exit-dialog__text">Закрыть приложение?</div>
          <div class="exit-dialog__buttons">
            <div class="exit-dialog__btn exit-dialog__btn--yes">Да</div>
            <div class="exit-dialog__btn exit-dialog__btn--no">Нет</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
