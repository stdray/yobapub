mode: ContinuousDelivery
next-version: 2.0.0
tag-prefix: '[vV]?'

branches:
  main:
    regex: '^master$|^main$'
    increment: Patch
    label: ''
    is-main-branch: true

  feature:
    regex: '^features?[/-](?<BranchName>.+)'
    increment: Inherit
    label: '{BranchName}'

  release:
    regex: '^releases?[/-](?<BranchName>.+)'
    increment: Minor
    label: rc
    is-release-branch: true

  hotfix:
    regex: '^hotfix(es)?[/-](?<BranchName>.+)'
    increment: Patch
    label: hotfix
