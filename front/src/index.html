<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>YobaPub</title>
  <link rel="icon" href="icon.png">

</head>
<body>
  <script>
  (function(){
    if(window.tizen||/Tizen|SmartTV|SMART-TV|Web0S/i.test(navigator.userAgent))return;
    document.querySelector('meta[name=viewport]').setAttribute('content','width=device-width,initial-scale=1.0');
    var st=document.createElement('style');
    st.textContent='html,body{width:1920px;height:1080px;overflow:auto}';
    document.head.appendChild(st);
  })();
  </script>
  <script src="vendor/jquery.min.js"></script>
  <script src="vendor/hls.min.js"></script>
  <div id="app">
    <div id="page-login" class="page"></div>
    <div id="page-watching" class="page hidden"></div>
    <div id="page-bookmarks" class="page hidden"></div>
    <div id="page-movie" class="page hidden"></div>
    <div id="page-serial" class="page hidden"></div>
    <div id="page-player" class="page hidden"></div>
    <div id="page-settings" class="page hidden"></div>
  </div>
</body>
</html>
